services:
  cloudways-monitor:
    build: .
    env_file:
      - .env
    volumes:
      - cloudways-monitor-data:/data
    ports:
      - "127.0.0.1:8083:8083"
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  cloudways-monitor-data:
